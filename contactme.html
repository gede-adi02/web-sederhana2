<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Web Mahasiswa</title>
    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            /* background-color: #666666;
            color: white;
            text-align: center;
            padding: 30px 0; */
            background-color: #666666;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            color: white;
        }

        header h1 {
            /* margin: 0;
            font-size: 40px;
            text-align: left;
            margin-left: 70px; */
            margin: 0;
            font-family: sans-serif;
            font-size: 40px;
        }

        .container {
            display: flex;
            flex: 1;
            background-color: #ffffff;
            width: 100%;
        }

        .content {
            /* width: 70%;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center; */
            width: 80%;
            margin: 0 auto;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 15px;
            
        }

        .content h2 {
            font-size: 30px;
            margin-bottom: 10px;
            /* margin-top: 0;
            text-align: center; */
        }

        .content p {
            font-size: 15px;
            line-height: 1.6;
            text-align: justify;
            max-width: 800px;
            /* margin: 5px 0;
            text-align: center; */
        }

        .button-web {
            text-decoration: none;
            display: inline-block;
            background-color: #666666; 
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 20px;
            /* transition: color 0.3s; */
            transition: all 0.3s ease;
            width: 250px;
            margin: 10px 0;
            text-align: center;
        }

        .button-web:hover {
            background-color: #beab56;
        }

        .button i {
            margin-right: 10px;
            margin-left: 10px;
            font-size: 20px;
        }

        footer {
            background-color: #666666;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        nav li {
            margin-left: 25px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-family: sans-serif;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #beab56;
        }


    </style>
</head>
<body>

    <header>
        <h1>Contact Me</h1>
            <nav>

                </ul>
            </nav>
    </header>

    <div class="container">
        <div class="content">
            <h2>Aplikasi Sosial Yang Saya Gunakan</h2>
            <a href="https://store.steampowered.com" class="button-web">
                <i class="fab fa-steam"></i>
            </a>
            <a href="https://facebook.com" class="button-web">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://instagram.com" class="button-web">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://github.com" class="button-web">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://linkedin.com" class="button-web">
                <i class="fab fa-linkedin"></i>
            </a>

        </div>
    </div>
