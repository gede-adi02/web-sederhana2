<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Web Mahasiswa</title>
    <style>
        table {
            width: 100%;
            height: 100vh;
            border-collapse: collapse;
        }
        td {
            border: 1px solid #666;
            padding: 20px;
            text-align: center;
        }
        .header {
            background-color: #666666;
            color: white;
            height: 100px;
        }

        .footer {
            background-color: #666666;
            color: white;
            height: 100px;
        }

        .sidebar {
            background-color: #f0f0f0;
            width: 20%;
        }
        .main {
            background-color: #ffffff;
        }

        ul.skill {
            list-style: none;
            color: #000000;
            line-height: 2.0;
        }

        ul.skill li:hover {
            font-weight: bold;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        a {
            color: rgb(0, 0, 0);
            text-decoration: none;
            font-family: sans-serif;
            transition: color 0.3s;
            display: block;
            padding: 5px 0;
        }

        a:hover {
            color: #beab56;
        }

    </style>
</head>
<body>

    <table>
        <tr>
            <td colspan="2" class="header">
                <h1>Daftar Skill</h1>
            </td>
        </tr>

        <tr>
            <td class="sidebar">
                <h3>List Menu</h3>
                <nav>
                    <ul>
                        <li><a href="menuutama.html">Menu Utama</a></li>
                        <li><a href="tentangsaya.html">Tentang Saya</a></li>
                        <li><a href="kontaksaya.html">Kontak Saya</a></li>
                        <li><a href="pendidikan.html">Pendidikan</a></li>
                        <li><a href="skill.html">Skill</a></li>
                        <li><a href="layout.html">Layout</a></li>
                    </ul>
                </nav>
            </td>
            <td class="main">
                <h2>Keahlian Saya</h2>
                <ul class="skill">
                    <li>HTML & CSS Dasar</li>
                    <li>PHP</li>
                    <li>Javascript</li>
                    <li>UI/UX Design (Figma)</li>
                    <li>Manajemen Database MySQL</li>
                    <li>Version Control (GitHub)</li>
                </ul>
            </td>
        </tr>

        <tr>
            <td colspan="2" class="footer">

            </td>
        </tr>
    </table>
