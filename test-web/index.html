<!DOCTYPE html>
<html lang="id">
<head>
    <!-- memastikan semua teks tampil benar -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Sederhana</title>
    <style>
        /* Mengatur dasar halaman */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Mengatur Header */
        header {
            background-color: #666666;
            color: white;
            text-align: center;
            padding: 30px 0;
        }

        header h1 {
            margin: 0;
            font-size: 40px;
        }

        /* Mengatur Kontainer Utama (Tengah) */
        .container {
            display: flex;
            flex: 1;
            background-color: #ffffff;
            width: 100%;
        }

        /* Mengatur Bagian Kiri (Tempat Foto) */
        .sidebar {
            background-color: #cccccc;
            width: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .sidebar img {
            width: 250px;
            height: auto;
        }

        /* Mengatur Bagian Kanan (Teks Biodata) */
        .content {
            width: 70%;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content h2 {
            font-size: 30px;
            margin-bottom: 20px;
            margin-top: 0;
        }

        .content p {
            font-size: 18px;
            margin: 5px 0;
            line-height: 1.6;
        }

        /* Mengatur Footer */
        footer {
            background-color: #666666;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 14px;
        }
    </style>
</head>
